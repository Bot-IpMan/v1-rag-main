version: "3.8"
services:
  qdrant:
    image: qdrant/qdrant:v1.9.4
    volumes:
      - ./qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    restart: unless-stopped

  rag-api:
    build: .
    environment:
      - QDRANT_URL=http://qdrant:6333
      - COLLECTION_NAME=docs
      - MODEL_NAME=Qwen/Qwen2.5-7B-Instruct
    volumes:
      - ./data:/app/data
      - ~/.cache/huggingface:/root/.cache/huggingface
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    restart: unless-stopped
